<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZK-Rollup Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; }
        .card { background: #1e293b; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1, h2 { color: #38bdf8; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #0ea5e9; }
        input { padding: 0.75rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-right: 1rem; }
        pre { background: #0f172a; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>ZK-Rollup Payment System</h1>
    
    <div class="card">
        <h2>Network State</h2>
        <p><strong>Current State Root:</strong> <span id="state-root">Loading...</span></p>
        <button onclick="fetchState()">Refresh State</button>
    </div>

    <div class="card">
        <h2>Submit Payment Intent</h2>
        <input type="text" id="sender" placeholder="Sender Address" value="0xUserA">
        <input type="text" id="recipient" placeholder="Recipient Address" value="0xUserB">
        <input type="number" id="amount" placeholder="Amount" value="100">
        <button onclick="submitIntent()">Submit Transaction</button>
        <p id="submit-status" style="color: #4ade80;"></p>
    </div>

    <div class="card">
        <h2>Recent Batches</h2>
        <pre id="batches-list">Loading...</pre>
    </div>

    <script>
        const API_URL = 'http://localhost:3001';

        async function fetchState() {
            try {
                const res = await fetch(`${API_URL}/state`);
                const data = await res.json();
                document.getElementById('state-root').innerText = data.stateRoot || '0x000...';
                
                const batchesRes = await fetch(`${API_URL}/batches`);
                const batches = await batchesRes.json();
                document.getElementById('batches-list').innerText = JSON.stringify(batches, null, 2);
            } catch (e) {
                console.error(e);
            }
        }

        async function submitIntent() {
            const sender = document.getElementById('sender').value;
            const recipient = document.getElementById('recipient').value;
            const amount = document.getElementById('amount').value;
            
            try {
                const res = await fetch(`${API_URL}/intents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender, recipient, amount })
                });
                if(res.ok) {
                    document.getElementById('submit-status').innerText = 'Transaction submitted successfully! Waiting for relayer to batch...';
                    setTimeout(() => { document.getElementById('submit-status').innerText = ''; }, 5000);
                    fetchState();
                }
            } catch (e) {
                console.error(e);
            }
        }

        // Initial load
        fetchState();
        setInterval(fetchState, 5000);
    </script>
</body>
</html>
